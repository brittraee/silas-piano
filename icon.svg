<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="130%">
      <stop offset="0%" stop-color="#2a2740"/>
      <stop offset="62%" stop-color="#1c1a26"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="22%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" fill="url(#bg)"/>
  <g>
    <!-- 8 rainbow keys, rounded bottoms like the app -->
    <g>
      <rect x="14"    y="34" width="15.5" height="120" rx="6" fill="#E5392E"/>
      <rect x="33.5"  y="34" width="15.5" height="120" rx="6" fill="#F47B20"/>
      <rect x="53"    y="34" width="15.5" height="120" rx="6" fill="#F4C430"/>
      <rect x="72.5"  y="34" width="15.5" height="120" rx="6" fill="#7FC241"/>
      <rect x="92"    y="34" width="15.5" height="120" rx="6" fill="#34B6A8"/>
      <rect x="111.5" y="34" width="15.5" height="120" rx="6" fill="#3FBEE6"/>
      <rect x="131"   y="34" width="15.5" height="120" rx="6" fill="#2E63D6"/>
      <rect x="150.5" y="34" width="15.5" height="120" rx="6" fill="#E83E8C"/>
    </g>
    <!-- gloss highlight across the tops -->
    <g>
      <rect x="14"    y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="33.5"  y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="53"    y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="72.5"  y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="92"    y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="111.5" y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="131"   y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
      <rect x="150.5" y="34" width="15.5" height="120" rx="6" fill="url(#gloss)"/>
    </g>
  </g>
</svg>
